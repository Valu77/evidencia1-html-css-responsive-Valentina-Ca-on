<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Reto Bordes Final - Valentina</title>
</head>
<body class="bg-gray-200 flex justify-center items-center h-screen">

    <!-- Contenedor principal con el color de fondo de la imagen -->
    <div class="relative w-[502px] h-[302px] bg-[#d1e7bc] border-[12px] border-[#d1e7bc]">
        
        <!-- Líneas Superiores (Naranjas/Doradas) -->
        <div class="absolute top-0 left-0 right-0 h-[3px] bg-[#b8860b]"></div>
        <div class="absolute top-[8px] left-0 right-0 h-[3px] bg-[#b8860b]"></div>

        <!-- Línea Izquierda (Azul Oscuro) -->
        <div class="absolute top-0 bottom-0 left-0 w-[12px] bg-[#1a3a5a]"></div>

        <!-- Línea Inferior (Azul Claro) -->
        <div class="absolute bottom-0 left-0 right-0 h-[2px] bg-[#5bc0de]"></div>

        <!-- Línea Derecha (Morada) - 4 Segmentos Exactos -->
        <div class="absolute right-0 top-0 bottom-0 w-[10px] flex flex-col justify-between">
            <div class="h-[60px] bg-[#7a2a95]"></div>
            <div class="h-[60px] bg-[#7a2a95]"></div>
            <div class="h-[60px] bg-[#7a2a95]"></div>
            <div class="h-[60px] bg-[#7a2a95]"></div>
        </div>

    </div>

</body>
</html>
