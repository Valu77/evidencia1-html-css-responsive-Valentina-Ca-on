<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- Mantenemos el script que copiamos en clase -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Tailwind - Valentina</title>
</head>
<body>
    <!-- Cambiamos el color de fondo a un rosado suave y el texto a un rojo intenso -->
    <h1 class="text-rose-700 bg-pink-100 text-2xl font-bold"> Mi Proyecto </h1>
    
    <!-- Cambiamos los divs a un tono rosado vibrante y variamos el texto -->
    <div class="inline bg-rose-500 text-white p-1"> Inicio </div>
    <div class="inline bg-rose-500 text-white p-1"> Galería </div>
    <div class="inline bg-rose-500 text-white p-1"> Soporte </div>
</body>
</html>
