<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estiloos display- Valentina</title>
    <style>
        .titulo {
            
            color: #b03a2e; 
            font-size: 17px;          
            background-color: #ffd1dc; 
            letter-spacing: 2.5px;   
        }
        .menu { 
            display: inline;
        
            background-color: #f06292; 
            color: white;              
            width: 490px;              
            height: 95px;              
        }
        .menu_block {
            display: block;
            background-color: #ec407a; 
            color: white;
            width: 510px;              
            height: 105px;             
        }
    </style>
</head>
<body>
    <h1 class="titulo">Linea seccion</h1>
    <div class="menu">Inicio</div>
    <div class="menu">Galería</div>
    <div class="menu">Ayuda</div>

    <hr>
    <h1 class="titulo">Secciones Block</h1>
    <div class="menu_block">Inicio</div>
    <div class="menu_block">Galería</div>
    <div class="menu_block">Ayuda</div>
</body>
</html>
