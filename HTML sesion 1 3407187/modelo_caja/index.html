<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .padre{
            display: block;
            background-color: skyblue;
            width: 400px;
            height: 400px;
            padding: 30px 20px 5px 40px;
            border:double rgb(218, 14, 14) 10px solid;
        
        }
        .hijo{
            display: block;
            background-color: cadetblue;
            width: 200px;
            height: 200px;
            padding-top: 20px;
            padding-left: 10px;
            border-top: dashed rgb(14, 218, 14) 10px;
            border-right-style: dotted;
            border-right-width: 20px;
            border-right-color: rgb(14, 218, 14);
        }
    </style>
</head>
<body>
    <div class="padre">
        <div class="hijo">hijo</div>
    </div>
</body>
</html>
