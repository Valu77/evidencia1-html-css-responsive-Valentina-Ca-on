<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <script src="https://cdn.tailwindcss.com"></script>
    <title>Reto Bordes - Tailwind (Corregido)</title>
</head>
<body class="bg-gray-200 flex justify-center items-center h-screen">

    <div class="relative w-[500px] h-[300px] bg-[#d1e7bc]">
        <!-- Líneas de arriba -->
        <div class="absolute top-[10px] left-[10px] right-[10px] h-1 bg-[#b8860b]"></div>
        <div class="absolute top-[20px] left-[10px] right-[10px] h-1 bg-[#b8860b]"></div>

        <!-- Línea izquierda -->
        <div class="absolute top-[10px] bottom-[10px] left-[10px] w-2.5 bg-[#1a3a5a]"></div>

        <!-- Línea de abajo -->
        <div class="absolute bottom-[10px] left-[10px] right-[10px] h-[2px] bg-[#5bc0de]"></div>

        <!-- Cuadritos de la derecha (la línea discontinua morada) -->
        <!-- Ajusté alturas y posiciones para que el último toque abajo -->
        <div class="absolute right-[10px] top-[30px] w-2 h-14 bg-[#7a2a95]"></div>
        <div class="absolute right-[10px] top-[105px] w-2 h-14 bg-[#7a2a95]"></div>
        <div class="absolute right-[10px] top-[180px] w-2 h-14 bg-[#7a2a95]"></div>
        
        <!-- Este es el que toca la línea azul clara: bottom = 10px (borde) + 2px (línea azul) -->
        <div class="absolute right-[10px] bottom-[12px] w-2 h-14 bg-[#7a2a95]"></div>
    </div>

</body>
</html>
