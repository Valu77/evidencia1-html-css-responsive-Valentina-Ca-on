<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Reto Bordes - CSS (Corregido)</title>
    <style>
        body {
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .contenedor {
            width: 500px;
            height: 300px;
            background-color: #d1e7bc; /* El verde del reto */
            position: relative;
        }
        /* Líneas de arriba (Doble línea dorada) */
        .l1 {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            height: 4px;
            background-color: #b8860b;
        }
        .l2 {
            position: absolute;
            top: 20px;
            left: 10px;
            right: 10px;
            height: 4px;
            background-color: #b8860b;
        }
        /* Línea izquierda (Azul gruesa) */
        .izq {
            position: absolute;
            top: 10px;
            bottom: 10px;
            left: 10px;
            width: 10px;
            background-color: #1a3a5a;
        }
        /* Línea de abajo (Azul clara delgada) */
        .abajo {
            position: absolute;
            bottom: 10px;
            left: 10px;
            right: 10px;
            height: 2px;
            background-color: #5bc0de;
        }
        /* Líneas de la derecha (Moradas discontinuas) */
        .der {
            position: absolute;
            right: 10px;
            width: 8px;
            background-color: #7a2a95;
        }
        /* Ajuste de posiciones para espaciado uniforme y toque final */
        .d1 { top: 30px; height: 50px; }
        .d2 { top: 100px; height: 50px; }
        .d3 { top: 170px; height: 50px; }
        
        /* La última pieza se posiciona desde ABAJO para tocar la línea azul */
        .d4 { 
            bottom: 12px; /* 10px del borde + 2px del grosor de la línea azul */
            height: 50px; 
        }
    </style>
</head>
<body>

    <div class="contenedor">
        <!-- Líneas superiores -->
        <div class="l1"></div>
        <div class="l2"></div>

        <!-- Línea izquierda -->
        <div class="izq"></div>

        <!-- Línea inferior -->
        <div class="abajo"></div>

        <!-- Bloques del lado derecho (la morada discontinua) -->
        <div class="der d1"></div>
        <div class="der d2"></div>
        <div class="der d3"></div>
        <div class="der d4"></div>
    </div>

</body>
</html>
